<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .section-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .small { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .tiny { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; ry: 16; }
      .subcard { fill: #f8fafc; stroke: #dbe4ee; stroke-width: 1.5; rx: 14; ry: 14; }
      .module { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; rx: 12; ry: 12; }
      .module-green { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 12; ry: 12; }
      .module-purple { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 1.5; rx: 12; ry: 12; }
      .module-orange { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; rx: 12; ry: 12; }
      .module-slate { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 12; ry: 12; }
      .platform { fill: none; stroke: #3b82f6; stroke-width: 2.5; stroke-dasharray: 10 8; rx: 18; ry: 18; }
      .line { stroke: #0f172a; stroke-width: 3; fill: none; }
      .line-soft { stroke: #64748b; stroke-width: 2.5; fill: none; }
      .line-dashed { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 6; fill: none; }
      .pill { fill: #dbeafe; stroke: #93c5fd; stroke-width: 1; rx: 18; ry: 18; }
      .pill-green { fill: #dcfce7; stroke: #86efac; stroke-width: 1; rx: 18; ry: 18; }
      .pill-purple { fill: #ede9fe; stroke: #c4b5fd; stroke-width: 1; rx: 18; ry: 18; }
      .icon-text { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: white; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#0f172a"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1600" height="950" fill="#f8fafc"/>

  <text x="800" y="56" text-anchor="middle" class="title">HRMS Project Architecture — Current Implementation</text>
  <text x="800" y="84" text-anchor="middle" class="subtitle">Responsive MERN HRMS with role-based permissions, sidebar governance, Swagger, notifications, audit logs, and priority Advance Request workflow</text>

  <!-- Left inputs -->
  <rect x="60" y="180" width="220" height="110" class="card"/>
  <circle cx="112" cy="235" r="26" fill="#3b82f6"/>
  <text x="112" y="242" text-anchor="middle" class="icon-text">U</text>
  <text x="170" y="226" text-anchor="middle" class="label">Client apps</text>
  <text x="170" y="250" text-anchor="middle" class="small">Browser · Mobile web · PWA</text>

  <rect x="60" y="395" width="220" height="170" class="card"/>
  <circle cx="112" cy="450" r="26" fill="#2563eb"/>
  <text x="112" y="457" text-anchor="middle" class="icon-text">CI</text>
  <text x="170" y="438" text-anchor="middle" class="label">CI / Delivery</text>
  <text x="170" y="464" text-anchor="middle" class="small">GitHub Actions</text>
  <text x="170" y="486" text-anchor="middle" class="small">Build · Smoke tests · Seed</text>
  <text x="170" y="518" text-anchor="middle" class="tiny">npm install / build / test / docs</text>

  <rect x="90" y="650" width="160" height="90" class="card"/>
  <circle cx="130" cy="695" r="22" fill="#0ea5e9"/>
  <text x="130" y="702" text-anchor="middle" class="icon-text">D</text>
  <text x="185" y="688" text-anchor="middle" class="label">Dev / Ops</text>
  <text x="185" y="712" text-anchor="middle" class="small">Configures roles,</text>
  <text x="185" y="732" text-anchor="middle" class="small">modules, sidebar</text>

  <!-- Platform boundary -->
  <rect x="360" y="120" width="980" height="700" class="platform"/>
  <text x="385" y="110" class="section-title" fill="#2563eb">HRMS Platform</text>

  <!-- Frontend section -->
  <rect x="390" y="150" width="275" height="290" class="card"/>
  <text x="528" y="180" text-anchor="middle" class="section-title">Front end — React + Vite</text>

  <rect x="415" y="205" width="225" height="60" class="module"/>
  <text x="528" y="229" text-anchor="middle" class="label">Auth + Setup screens</text>
  <text x="528" y="249" text-anchor="middle" class="small">Login · Setup admin · Forgot / Reset</text>

  <rect x="415" y="280" width="225" height="68" class="module-purple"/>
  <text x="528" y="304" text-anchor="middle" class="label">App shell</text>
  <text x="528" y="324" text-anchor="middle" class="small">Protected routes · Topbar · Sidebar</text>

  <rect x="415" y="363" width="225" height="58" class="module-orange"/>
  <text x="528" y="387" text-anchor="middle" class="label">Dynamic navigation</text>
  <text x="528" y="407" text-anchor="middle" class="small">Sidebar hidden/shown by role permissions</text>

  <!-- Backend section -->
  <rect x="690" y="150" width="620" height="390" class="card"/>
  <text x="1000" y="180" text-anchor="middle" class="section-title">Back-end services — Node.js + Express</text>

  <rect x="720" y="205" width="160" height="74" class="module"/>
  <text x="800" y="230" text-anchor="middle" class="label">REST API Layer</text>
  <text x="800" y="251" text-anchor="middle" class="small">Routes · Controllers · Validation</text>

  <rect x="900" y="205" width="180" height="74" class="module-purple"/>
  <text x="990" y="230" text-anchor="middle" class="label">Auth middleware</text>
  <text x="990" y="251" text-anchor="middle" class="small">JWT access + refresh cookie flow</text>

  <rect x="1100" y="205" width="180" height="74" class="module-orange"/>
  <text x="1190" y="230" text-anchor="middle" class="label">Permission middleware</text>
  <text x="1190" y="251" text-anchor="middle" class="small">Role + module + action checks</text>

  <rect x="720" y="305" width="120" height="68" class="module-slate"/>
  <text x="780" y="332" text-anchor="middle" class="label">Employees</text>
  <text x="780" y="352" text-anchor="middle" class="tiny">directory · profile</text>

  <rect x="855" y="305" width="120" height="68" class="module-slate"/>
  <text x="915" y="332" text-anchor="middle" class="label">Attendance</text>
  <text x="915" y="352" text-anchor="middle" class="tiny">check-in · regularization</text>

  <rect x="990" y="305" width="120" height="68" class="module-slate"/>
  <text x="1050" y="332" text-anchor="middle" class="label">Leave</text>
  <text x="1050" y="352" text-anchor="middle" class="tiny">apply · approve</text>

  <rect x="1125" y="300" width="155" height="78" class="module-green"/>
  <text x="1202" y="326" text-anchor="middle" class="label">Advance Request</text>
  <text x="1202" y="347" text-anchor="middle" class="small">priority module</text>
  <text x="1202" y="366" text-anchor="middle" class="tiny">request · review · approve · pay</text>

  <rect x="720" y="395" width="120" height="68" class="module-slate"/>
  <text x="780" y="422" text-anchor="middle" class="label">Payroll</text>
  <text x="780" y="442" text-anchor="middle" class="tiny">structures · runs · payslips</text>

  <rect x="855" y="395" width="120" height="68" class="module-slate"/>
  <text x="915" y="422" text-anchor="middle" class="label">Performance</text>
  <text x="915" y="442" text-anchor="middle" class="tiny">reviews · goals</text>

  <rect x="990" y="395" width="120" height="68" class="module-slate"/>
  <text x="1050" y="422" text-anchor="middle" class="label">Reports</text>
  <text x="1050" y="442" text-anchor="middle" class="tiny">overview metrics</text>

  <rect x="1125" y="395" width="155" height="68" class="module-purple"/>
  <text x="1202" y="422" text-anchor="middle" class="label">Settings</text>
  <text x="1202" y="442" text-anchor="middle" class="tiny">company config · holidays</text>

  <!-- Utility section -->
  <rect x="390" y="470" width="920" height="320" class="card"/>
  <text x="850" y="500" text-anchor="middle" class="section-title">Utility, Governance, and Data Services</text>

  <rect x="420" y="530" width="210" height="92" class="subcard"/>
  <text x="525" y="557" text-anchor="middle" class="label">Swagger / OpenAPI</text>
  <text x="525" y="578" text-anchor="middle" class="small">Interactive API docs</text>
  <text x="525" y="598" text-anchor="middle" class="small">Try it out for all endpoints</text>

  <rect x="650" y="530" width="210" height="92" class="subcard"/>
  <text x="755" y="557" text-anchor="middle" class="label">Notification service</text>
  <text x="755" y="578" text-anchor="middle" class="small">In-app alerts</text>
  <text x="755" y="598" text-anchor="middle" class="small">Unread count · mark read</text>

  <rect x="880" y="530" width="210" height="92" class="subcard"/>
  <text x="985" y="557" text-anchor="middle" class="label">Audit logging</text>
  <text x="985" y="578" text-anchor="middle" class="small">Security trail for HRMS actions</text>
  <text x="985" y="598" text-anchor="middle" class="small">Permissions, payroll, settings, advances</text>

  <rect x="1110" y="530" width="170" height="92" class="subcard"/>
  <text x="1195" y="557" text-anchor="middle" class="label">Mail service</text>
  <text x="1195" y="578" text-anchor="middle" class="small">SMTP / console fallback</text>
  <text x="1195" y="598" text-anchor="middle" class="small">approval + reset emails</text>

  <rect x="420" y="650" width="420" height="110" class="module-green"/>
  <text x="630" y="678" text-anchor="middle" class="section-title">Permission Management System</text>
  <text x="630" y="704" text-anchor="middle" class="small">RolePermission model · role-wise actions · module enable/disable · sidebar visibility</text>
  <text x="630" y="728" text-anchor="middle" class="small">Delegable access: admin can allow HR / manager / another role to manage permissions later</text>

  <rect x="870" y="650" width="410" height="110" class="module"/>
  <text x="1075" y="678" text-anchor="middle" class="section-title">PWA + Quality layer</text>
  <text x="1075" y="704" text-anchor="middle" class="small">Manifest · service worker · smoke tests · responsive UI · CI scaffold</text>
  <text x="1075" y="728" text-anchor="middle" class="small">npm install · seed · build · backend tests</text>

  <!-- External stores -->
  <rect x="1380" y="180" width="160" height="210" class="card"/>
  <circle cx="1460" cy="225" r="28" fill="#10b981"/>
  <text x="1460" y="232" text-anchor="middle" class="icon-text">DB</text>
  <text x="1460" y="274" text-anchor="middle" class="section-title">MongoDB</text>
  <text x="1460" y="302" text-anchor="middle" class="small">Users</text>
  <text x="1460" y="322" text-anchor="middle" class="small">RolePermissions</text>
  <text x="1460" y="342" text-anchor="middle" class="small">Advances · Leaves · Attendance</text>
  <text x="1460" y="362" text-anchor="middle" class="small">Payroll · Performance</text>
  <text x="1460" y="382" text-anchor="middle" class="small">Notifications · AuditLogs</text>

  <rect x="1380" y="425" width="160" height="110" class="card"/>
  <circle cx="1460" cy="468" r="24" fill="#8b5cf6"/>
  <text x="1460" y="475" text-anchor="middle" class="icon-text">@</text>
  <text x="1460" y="507" text-anchor="middle" class="label">External integrations</text>
  <text x="1460" y="528" text-anchor="middle" class="small">SMTP / email delivery</text>

  <!-- Arrows -->
  <path d="M280 235 L360 235 L360 235 L390 235" class="line" marker-end="url(#arrow)"/>
  <path d="M280 470 L360 470 L360 705 L420 705" class="line-dashed" marker-end="url(#arrowSoft)"/>
  <path d="M250 695 L420 695" class="line" marker-end="url(#arrow)"/>

  <path d="M640 235 L720 235" class="line" marker-end="url(#arrow)"/>
  <path d="M880 242 L900 242" class="line" marker-end="url(#arrow)"/>
  <path d="M1080 242 L1100 242" class="line" marker-end="url(#arrow)"/>

  <path d="M1280 242 L1380 242" class="line" marker-end="url(#arrow)"/>
  <path d="M1195 578 L1380 478" class="line-soft" marker-end="url(#arrowSoft)"/>

  <path d="M630 650 L630 620 L755 620 L755 622" class="line-dashed" marker-end="url(#arrowSoft)"/>
  <path d="M630 650 L985 650 L985 622" class="line-dashed" marker-end="url(#arrowSoft)"/>
  <path d="M630 650 L1195 650 L1195 622" class="line-dashed" marker-end="url(#arrowSoft)"/>

  <!-- Legend pills -->
  <rect x="410" y="850" width="190" height="34" class="pill-green"/>
  <text x="505" y="872" text-anchor="middle" class="small">Priority module: Advance</text>
  <rect x="620" y="850" width="250" height="34" class="pill"/>
  <text x="745" y="872" text-anchor="middle" class="small">Permissions control modules + sidebar</text>
  <rect x="890" y="850" width="225" height="34" class="pill-purple"/>
  <text x="1002" y="872" text-anchor="middle" class="small">Delegable permission governance</text>

  <text x="800" y="914" text-anchor="middle" class="tiny">Generated from the current HRMS implementation status: React/Vite frontend, Express backend, MongoDB domain models, Swagger docs, notifications, audit logs, and role-based permission management.</text>
</svg>