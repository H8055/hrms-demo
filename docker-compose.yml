version: '3.9'
services:
  mongo:
    image: mongo:7
    container_name: hrms-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    ports:
      - '5000:5000'
    depends_on:
      - mongo

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  mongo_data:
