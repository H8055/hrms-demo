name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: ['*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run test -w backend
      - run: npm run build -w frontend
      - run: node -e "import('./backend/src/app.js').then(() => console.log('backend ok'))"
